name: embeddings

# #11 — generate the optional embeddings.json artifact. Manual only: semantic
# search is opt-in and a real provider needs an API key. This workflow builds the
# artifact and uploads it for inspection; it does NOT deploy to the live site
# (publishing + enabling a provider is a documented operator step — see RUNBOOK.md).
# The built-in local-hash provider is deterministic and key-free (for validating
# the pipeline); plug a real provider + secret to produce semantic vectors.

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Embedding provider"
        default: "local-hash"
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build index
        run: python scripts/build_index.py

      - name: Build embeddings
        run: |
          python scripts/build_embeddings.py \
            --provider "${{ inputs.provider }}" \
            --out embeddings.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: embeddings-json
          path: embeddings.json
          retention-days: 7
