name: lint

on:
  pull_request:
    paths:
      - "mcp-server/**"
      - "scripts/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e mcp-server[dev] -r requirements.txt

      - name: Ruff
        run: ruff check mcp-server/src mcp-server/tests scripts

      - name: Mypy (package src only)
        run: mypy --config-file mcp-server/pyproject.toml
