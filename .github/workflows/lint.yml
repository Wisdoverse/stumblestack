name: lint

on:
  pull_request:
    paths:
      - "mcp-server/**"
      - "scripts/**"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e mcp-server[dev] -r requirements.txt

      - name: Ruff
        run: ruff check mcp-server/src mcp-server/tests scripts

      - name: Mypy (package src only)
        run: mypy --config-file mcp-server/pyproject.toml
