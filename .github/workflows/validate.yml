name: validate

on:
  pull_request:
    paths:
      - "pitfalls/**"
      - "schemas/**"
      - "scripts/**"
      - "mcp-server/**"
      - "requirements.txt"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install MCP server + script + test deps
        run: pip install -e mcp-server -r requirements.txt pytest

      - name: Run unit tests (server, source, search, scripts, security)
        run: pytest mcp-server/tests -q

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Validate pitfall entries
        run: python scripts/validate.py

      - name: Build index
        run: python scripts/build_index.py

      - name: Guard against accidental index shrinkage
        run: python scripts/index_check.py --new index.json

      - name: Search quality eval (A13 regression gate)
        run: python scripts/eval_search.py --min-r10 0.8

      - name: Check index is up to date
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code index.json; then
            echo "::error::index.json is stale. Run scripts/build_index.py and commit the result."
            exit 1
          fi

      - name: Commit updated index on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet index.json; then
            git config user.name "stumblestack-bot"
            git config user.email "bot@stumblestack.dev"
            git add index.json
            git commit -m "chore: rebuild index.json"
            git push
          fi
