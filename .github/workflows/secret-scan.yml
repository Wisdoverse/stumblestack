name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # trufflehog scans the diff for verified secrets. Free and OSS-friendly,
      # unlike gitleaks-action which requires a paid license for organization
      # repositories. Pinned to commit SHA per A43.
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          # Scan the entire history on push to main; scan only the diff on PRs.
          extra_args: --only-verified
